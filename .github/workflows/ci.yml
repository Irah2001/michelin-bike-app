name: Michelin App CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build-frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Récupération du code
              uses: actions/checkout@v4

            - name: Configuration de Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"

            - name: Installation et Build (Frontend)
              run: |
                  cd frontend
                  npm install
                  npm run build

    build-backend:
        runs-on: ubuntu-latest
        steps:
            - name: Récupération du code
              uses: actions/checkout@v4

            - name: Configuration de Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"

            - name: Installation et Build (Backend)
              run: |
                  cd backend
                  npm install
                  npm run build
